services:
  postgres:
    image: postgres:16-alpine
    container_name: hegemon-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: hegemon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hegemon_dev}
      POSTGRES_DB: hegemon
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
